<style>
  :root {
    color-scheme: dark;
    --bg:#05080a; --panel:#0a1014; --panel-line:#15321f; --grid-line:rgba(0,255,140,0.05);
    --green:#2bff9a; --green-dim:#1f8f5c; --cyan:#25e0ff; --red:#ff4d6d; --amber:#ffcf4a;
    --text:#b9f3d2; --text-dim:#5f8f78;
    --mono:"SF Mono","JetBrains Mono","Fira Code",Menlo,Consolas,"Liberation Mono",monospace;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:var(--mono); background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased;
    background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px); background-size:28px 28px; }
  body::before { content:""; position:fixed; inset:0; pointer-events:none; z-index:9999; background:repeating-linear-gradient(0deg,rgba(0,0,0,0.16) 0px,rgba(0,0,0,0.16) 1px,transparent 1px,transparent 3px); opacity:0.35; }
  .wrap { max-width:900px; margin:0 auto; padding:22px 16px 48px; position:relative; z-index:1; }
  .nav { display:flex; gap:16px; margin-bottom:14px; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; }
  .nav a { color:var(--cyan); text-decoration:none; } .nav a:hover { text-shadow:0 0 6px rgba(37,224,255,0.5); }
  .nav a::before { content:"‹ "; }
  .title { font-size:17px; font-weight:700; margin:0; color:var(--green); text-transform:uppercase; letter-spacing:0.12em; text-shadow:0 0 6px rgba(43,255,154,0.55); }
  .title::before { content:"▌ "; }
  .sub { font-size:11px; color:var(--text-dim); margin:3px 0 16px; letter-spacing:0.04em; text-transform:uppercase; }
  .alert { background:rgba(255,77,109,0.08); border:1px solid rgba(255,77,109,0.45); border-radius:4px; padding:10px 13px; margin:0 0 16px; font-size:11.5px; color:#ffb3c1; letter-spacing:0.02em; line-height:1.5; }
  .alert b { color:var(--red); }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-bottom:18px; }
  .card { background:var(--panel); border:1px solid var(--panel-line); border-radius:4px; padding:12px 14px; box-shadow:inset 0 0 22px rgba(0,255,140,0.04); }
  .card .label { font-size:10px; color:var(--text-dim); margin:0 0 5px; text-transform:uppercase; letter-spacing:0.12em; }
  .card .value { font-size:21px; font-weight:700; margin:0; color:var(--green); font-variant-numeric:tabular-nums; text-shadow:0 0 8px rgba(43,255,154,0.4); }
  .overall { background:linear-gradient(90deg,rgba(43,255,154,0.09),rgba(37,224,255,0.04)); border:1px solid rgba(43,255,154,0.38); border-radius:5px; padding:14px 16px; margin-bottom:12px; box-shadow:inset 0 0 28px rgba(43,255,154,0.06); }
  .overall .ov-label { font-size:10px; text-transform:uppercase; letter-spacing:0.14em; color:var(--text-dim); margin-bottom:4px; }
  .overall .ov-value { font-size:27px; font-weight:700; font-variant-numeric:tabular-nums; text-shadow:0 0 11px rgba(43,255,154,0.4); }
  .plgrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(165px,1fr)); gap:10px; margin-bottom:18px; }
  .plcard { background:var(--panel); border:1px solid rgba(43,255,154,0.22); border-radius:4px; padding:13px 15px; box-shadow:inset 0 0 22px rgba(0,255,140,0.05); }
  .plcard .label { font-size:10px; color:var(--text-dim); margin:0 0 5px; text-transform:uppercase; letter-spacing:0.12em; }
  .plcard .value { font-size:22px; font-weight:700; margin:0; font-variant-numeric:tabular-nums; text-shadow:0 0 8px rgba(43,255,154,0.3); }
  .plcard .sub2 { font-size:10.5px; color:var(--text-dim); margin:4px 0 0; letter-spacing:0.04em; }
  .section-title { font-size:11px; font-weight:700; color:var(--green-dim); margin:24px 0 8px; text-transform:uppercase; letter-spacing:0.12em; }
  .section-title::before { content:"// "; color:var(--green); }
  table { width:100%; border-collapse:collapse; font-size:12.5px; font-variant-numeric:tabular-nums; }
  thead th { text-align:right; padding:8px 7px; color:var(--green-dim); font-weight:600; text-transform:uppercase; letter-spacing:0.08em; font-size:10px; border-bottom:1px solid var(--panel-line); }
  thead th:first-child { text-align:left; }
  tbody td { padding:9px 7px; text-align:right; border-bottom:1px solid rgba(21,50,31,0.6); color:var(--text); }
  tbody td:first-child { text-align:left; font-weight:700; color:var(--green); letter-spacing:0.04em; }
  tbody tr:last-child td { border-bottom:none; }
  .pos { color:var(--green)!important; text-shadow:0 0 6px rgba(43,255,154,0.35); }
  .neg { color:var(--red)!important; text-shadow:0 0 6px rgba(255,77,109,0.35); }
  .tag { display:inline-block; font-size:9px; padding:1px 5px; border-radius:2px; text-transform:uppercase; letter-spacing:0.05em; border:1px solid transparent; }
  .tag.buy { background:rgba(43,255,154,0.08); color:var(--green); border-color:rgba(43,255,154,0.4); }
  .tag.sell { background:rgba(255,77,109,0.08); color:var(--red); border-color:rgba(255,77,109,0.4); }
  .lev-tag { display:inline-block; font-size:8px; font-weight:700; letter-spacing:0.1em; padding:1px 5px; margin-left:6px; border-radius:2px; background:rgba(37,224,255,0.1); color:var(--cyan); border:1px solid rgba(37,224,255,0.35); vertical-align:1px; }
  .note { font-size:11px; color:var(--text-dim); margin-top:10px; }
  .loading { font-size:12px; color:var(--text-dim); }
  .foot { font-size:10px; color:var(--text-dim); margin-top:28px; border-top:1px solid var(--panel-line); padding-top:12px; line-height:1.7; }

  /* ===== iPhone 16 Pro (and similar phones, <= 440px) ===== */
  @media (max-width: 440px) {
    body { background-size:22px 22px; }
    .wrap { padding:14px 11px 34px; }
    .title { font-size:14px; letter-spacing:0.08em; }
    .sub { font-size:10px; }
    .overall { padding:11px 13px; }
    .overall .ov-value { font-size:22px; }
    .plgrid { grid-template-columns:1fr; gap:8px; }
    .plcard { padding:11px 13px; }
    .plcard .value { font-size:19px; }
    .cards { grid-template-columns:repeat(2,1fr); gap:8px; }
    .card { padding:10px 11px; }
    .card .value { font-size:18px; }
    .section-title { font-size:10px; margin:18px 0 6px; }
    #report { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    #report table { min-width:480px; }
    table { font-size:11.5px; }
    thead th, tbody td { padding:7px 5px; }
    .foot { font-size:10px; }
  }

  /* ===== iPad Pro 12.9" and larger (>= 1024px) ===== */
  @media (min-width: 1024px) {
    .wrap { max-width:1060px; padding:30px 26px 56px; }
    .title { font-size:20px; }
    .sub { font-size:12px; }
    .cards { grid-template-columns:repeat(3,1fr); gap:12px; }
    .plgrid { grid-template-columns:repeat(3,1fr); gap:12px; }
    .plcard { padding:14px 16px; }
    .plcard .value { font-size:24px; }
    .card { padding:14px 16px; }
    .card .value { font-size:24px; }
    table { font-size:13.5px; }
    thead th { font-size:11px; }
    thead th, tbody td { padding:10px 9px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="nav"><a href="index.html">All reports</a><a href="../index.html">Live dashboard</a></div>
  <div id="report"><p class="loading">Loading report…</p></div>
  <div class="foot">Agentic momentum strategy &mdash; automated end-of-day report. Informational only, not investment advice. Leveraged/inverse ETFs carry substantial risk of loss.</div>
</div>

<!-- The daily-report task replaces ONLY the JSON in this block. Shape:
     { date, generatedAt, account:{totalValue,equityValue,cash,buyingPower},
       unrealizedPnl, unrealizedPnlPct, realizedToday, realizedAllTime, realizedRate,
       trades:[{side,symbol,detail,price,agentic,note}], positions:[{symbol,qty,avgCost,last,pnlPct,isLev}],
       intraday:[{time,pnlPct,totalValue}] } -->
<script type="application/json" id="report-data">
{"date":"2026-07-17","generatedAt":"2026-07-17 3:32 PM CT","alert":"<b>Gate era ended ~10:50 AM CT.</b> By user directive the entry-gate stack (pullback-hold, O2/O3, EMA validity gate, the 10:15 deploy window and the noise lattice) was removed after 7 sessions at &minus;9.91%. Today's book &mdash; 5 names entered 9:18&ndash;9:19 AM CT &mdash; finished 0 for 5 and was fully liquidated by 10:49 AM CT. Proceeds are T+1 in this cash account, so the session ended by settlement rather than by signal.","account":{"totalValue":567.39,"equityValue":0.0,"cash":567.39,"buyingPower":0.0},"unrealizedPnl":0,"unrealizedPnlPct":null,"realizedToday":-12.39,"realizedAllTime":20.02,"realizedRate":0.2553,"trades":[{"side":"buy","symbol":"SLS","detail":"$120.00","price":12.9458,"agentic":true,"note":"AM deploy"},{"side":"buy","symbol":"TRVI","detail":"$115.00","price":19.7742,"agentic":true,"note":"AM deploy"},{"side":"buy","symbol":"SG","detail":"$115.00","price":7.359,"agentic":true,"note":"AM deploy"},{"side":"buy","symbol":"FSLY","detail":"$110.00","price":21.6773,"agentic":true,"note":"AM deploy"},{"side":"buy","symbol":"FCEL","detail":"$110.00","price":18.646,"agentic":true,"note":"AM deploy"},{"side":"sell","symbol":"SG","detail":"15.6271 sh","price":7.2412,"agentic":true,"note":""},{"side":"sell","symbol":"SLS","detail":"9.2694 sh","price":12.5923,"agentic":true,"note":""},{"side":"sell","symbol":"FSLY","detail":"5.0744 sh","price":21.0801,"agentic":true,"note":""},{"side":"sell","symbol":"FCEL","detail":"5.8994 sh","price":18.5302,"agentic":true,"note":""},{"side":"sell","symbol":"TRVI","detail":"5.8157 sh","price":19.1525,"agentic":true,"note":""},{"side":"buy","symbol":"SKHY","detail":"$9.78","price":164.8962,"agentic":true,"note":""},{"side":"sell","symbol":"SKHY","detail":"0.0593 sh","price":165.9701,"agentic":true,"note":""}],"positions":[],"intraday":[{"time":"8:25 AM","pnlPct":0,"totalValue":579.78},{"time":"8:32 AM","pnlPct":0,"totalValue":579.78},{"time":"8:55 AM","pnl </script>

<script>
function fmtUsd(n){ if(n===null||n===undefined||isNaN(n))return '—'; var s=n<0?'-':''; return s+'$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtPct(n){ if(n===null||n===undefined||isNaN(n))return ''; var s=n>=0?'+':''; return ' ('+s+n.toFixed(1)+'%)'; }
function fmtPctOnly(n){ if(n===null||n===undefined||isNaN(n))return '—'; var s=n>=0?'+':''; return s+n.toFixed(2)+'%'; }

function render(d){
  var a=d.account||{}, el=document.getElementById('report');
  var realized=(d.realizedAllTime==null)?null:d.realizedAllTime, unreal=(d.unrealizedPnl==null)?0:d.unrealizedPnl;
  var overall=(realized==null?0:realized)+unreal;
  var html='<p class="title">EOD Report &middot; '+(d.date||'—')+'</p>'
    + '<p class="sub">Agentic Account &middot; generated '+(d.generatedAt||'—')+'</p>';
  if(d.alert){ html+='<div class="alert">'+d.alert+'</div>'; }

  // Hero: overall all-time P/L (realized + unrealized)
  html+='<div class="overall"><div class="ov-label">Overall P/L &middot; realized + unrealized, all-time</div>'
    + '<div class="ov-value '+(overall>=0?'pos':'neg')+'">'+fmtUsd(overall)+'</div></div>';

  // Headline P/L breakdown — each figure gets its own panel rather than crammed corner text
  var realizedRateStr = (d.realizedRate==null)?'':((d.realizedRate>=0?'+':'')+d.realizedRate.toFixed(2)+'% on cost');
  var unrealPctStr = (d.unrealizedPnlPct==null)?'':((d.unrealizedPnlPct>=0?'+':'')+d.unrealizedPnlPct.toFixed(2)+'% vs cost');
  html+='<div class="plgrid">'
    + '<div class="plcard"><p class="label">Realized &middot; all-time</p><p class="value '+((realized==null||realized>=0)?'pos':'neg')+'">'+fmtUsd(realized)+'</p>'+(realizedRateStr?'<p class="sub2">'+realizedRateStr+'</p>':'')+'</div>'
    + '<div class="plcard"><p class="label">Realized &middot; today</p><p class="value '+((d.realizedToday==null||d.realizedToday>=0)?'pos':'neg')+'">'+fmtUsd(d.realizedToday)+'</p></div>'
    + '<div class="plcard"><p class="label">Open unrealized</p><p class="value '+((unreal>=0)?'pos':'neg')+'">'+fmtUsd(unreal)+'</p>'+(unrealPctStr?'<p class="sub2">'+unrealPctStr+'</p>':'')+'</div>'
    + '</div>';

  // Account snapshot
  html+='<div class="cards">'
    + '<div class="card"><p class="label">Account value</p><p class="value">'+fmtUsd(a.totalValue)+'</p></div>'
    + '<div class="card"><p class="label">Cash</p><p class="value">'+fmtUsd(a.cash)+'</p></div>'
    + '<div class="card"><p class="label">Equity held</p><p class="value">'+fmtUsd(a.equityValue)+'</p></div>'
    + '</div>';

  // Trades
  html+='<p class="section-title">Trades today</p>';
  if(d.trades && d.trades.length){
    var tr='';
    d.trades.forEach(function(t){
      tr+='<tr><td>'+t.symbol+'</td><td style="text-align:left"><span class="tag '+(t.side==='buy'?'buy':'sell')+'">'+t.side+'</span></td>'
        +'<td>'+(t.detail||'')+'</td><td>'+(t.price==null?'—':fmtUsd(t.price))+'</td>'
        +'<td style="text-align:left">'+(t.note||'')+(t.agentic?' <span class="lev-tag">AUTO</span>':'')+'</td></tr>';
    });
    html+='<table><thead><tr><th>Symbol</th><th style="text-align:left">Side</th><th>Detail</th><th>Fill</th><th style="text-align:left">Note</th></tr></thead><tbody>'+tr+'</tbody></table>';
  } else { html+='<p class="note">No trades executed today.</p>'; }

  // EOD positions
  html+='<p class="section-title">Positions at close</p>';
  if(d.positions && d.positions.length){
    var pr='';
    d.positions.forEach(function(p){
      pr+='<tr><td>'+p.symbol+(p.isLev?'<span class="lev-tag">LEV</span>':'')+'</td><td>'+Number(p.qty).toFixed(2)+'</td>'
        +'<td>'+fmtUsd(p.avgCost)+'</td><td>'+fmtUsd(p.last)+'</td><td class="'+(p.pnlPct>=0?'pos':'neg')+'">'+fmtPctOnly(p.pnlPct)+'</td></tr>';
    });
    html+='<table><thead><tr><th>Symbol</th><th>Qty</th><th>Avg</th><th>Last</th><th>P/L %</th></tr></thead><tbody>'+pr+'</tbody></table>';
  } else { html+='<p class="note">Flat &mdash; all positions closed to cash for overnight (no gap risk).</p>'; }

  // Intraday arc
  if(d.intraday && d.intraday.length){
    html+='<p class="section-title">Intraday P/L arc</p><table><thead><tr><th>Time (CT)</th><th>P/L %</th><th>Account value</th></tr></thead><tbody>';
    d.intraday.forEach(function(e){ html+='<tr><td>'+e.time+'</td><td class="'+(e.pnlPct>=0?'pos':'neg')+'">'+fmtPctOnly(e.pnlPct)+'</td><td>'+fmtUsd(e.totalValue)+'</td></tr>'; });
    html+='</tbody></table>';
  }

  el.innerHTML=html;
}
try { render(JSON.parse(document.getElementById('report-data').textContent)||{}); }
catch(e){ document.getElementById('report').innerHTML='<p class="loading">Report data unavailable.</p>'; }
</script>
</body>
</html>
