<style>
  :root {
    color-scheme: dark;
    --bg:#05080a; --panel:#0a1014; --panel-line:#15321f; --grid-line:rgba(0,255,140,0.05);
    --green:#2bff9a; --green-dim:#1f8f5c; --cyan:#25e0ff; --red:#ff4d6d;
    --text:#b9f3d2; --text-dim:#5f8f78;
    --mono:"SF Mono","JetBrains Mono","Fira Code",Menlo,Consolas,"Liberation Mono",monospace;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:var(--mono); background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased;
    background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px); background-size:28px 28px; }
  body::before { content:""; position:fixed; inset:0; pointer-events:none; z-index:9999; background:repeating-linear-gradient(0deg,rgba(0,0,0,0.16) 0px,rgba(0,0,0,0.16) 1px,transparent 1px,transparent 3px); opacity:0.35; }
  .wrap { max-width:760px; margin:0 auto; padding:22px 16px 48px; position:relative; z-index:1; }
  .nav { margin-bottom:14px; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; }
  .nav a { color:var(--cyan); text-decoration:none; } .nav a:hover { text-shadow:0 0 6px rgba(37,224,255,0.5); }
  .nav a::before { content:"‹ "; }
  .title { font-size:17px; font-weight:700; margin:0; color:var(--green); text-transform:uppercase; letter-spacing:0.12em; text-shadow:0 0 6px rgba(43,255,154,0.55); }
  .title::before { content:"▌ "; }
  .sub { font-size:11px; color:var(--text-dim); margin:3px 0 18px; letter-spacing:0.04em; text-transform:uppercase; }
  table { width:100%; border-collapse:collapse; font-size:13px; font-variant-numeric:tabular-nums; }
  thead th { text-align:right; padding:8px 8px; color:var(--green-dim); font-weight:600; text-transform:uppercase; letter-spacing:0.08em; font-size:10px; border-bottom:1px solid var(--panel-line); }
  thead th:first-child { text-align:left; }
  tbody td { padding:11px 8px; text-align:right; border-bottom:1px solid rgba(21,50,31,0.6); color:var(--text); }
  tbody td:first-child { text-align:left; }
  tbody tr:last-child td { border-bottom:none; }
  tbody tr:hover td { background:rgba(43,255,154,0.05); }
  td a { color:var(--green); text-decoration:none; font-weight:700; letter-spacing:0.04em; }
  td a:hover { text-shadow:0 0 7px rgba(43,255,154,0.5); }
  td a::after { content:" ›"; color:var(--green-dim); }
  .pos { color:var(--green)!important; text-shadow:0 0 6px rgba(43,255,154,0.35); }
  .neg { color:var(--red)!important; text-shadow:0 0 6px rgba(255,77,109,0.35); }
  .loading { font-size:12px; color:var(--text-dim); }
  .foot { font-size:10px; color:var(--text-dim); margin-top:28px; border-top:1px solid var(--panel-line); padding-top:12px; line-height:1.7; }
  @media (max-width:440px) {
    body { background-size:22px 22px; }
    .wrap { padding:14px 11px 34px; }
    .title { font-size:14px; letter-spacing:0.08em; }
    table { font-size:12px; } thead th, tbody td { padding:9px 6px; }
  }
  @media (min-width:1024px) {
    .wrap { max-width:880px; padding:30px 26px 56px; }
    .title { font-size:20px; }
    table { font-size:14px; } thead th, tbody td { padding:12px 10px; }
  }

<body>
<div class="wrap">
  <div class="nav"><a href="../index.html">Live dashboard</a></div>
  <p class="title">EOD Reports</p>
  <p class="sub">Account 849696877 &middot; one report per trading day, newest first</p>
  <div id="list"><p class="loading">Loading reports…</p></div>
  <div class="foot">Automated end-of-day reports from the Agentic momentum strategy. Informational only, not investment advice.</div>
</div>

<!-- The daily-report task replaces ONLY the JSON in this block: an array of
     {date, pnlPct, totalValue}, one per report, any order (sorted client-side, newest first). -->
<script type="application/json" id="reports-list">
[]
</script>

<script>
function fmtUsd(n){ if(n===null||n===undefined||isNaN(n))return '—'; var s=n<0?'-':''; return s+'$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtPctOnly(n){ if(n===null||n===undefined||isNaN(n))return '—'; var s=n>=0?'+':''; return s+n.toFixed(2)+'%'; }
var list=[];
try { list=JSON.parse(document.getElementById('reports-list').textContent)||[]; } catch(e){ list=[]; }
var el=document.getElementById('list');
if(!list.length){ el.innerHTML='<p class="loading">No reports logged yet — the first lands after today’s close.</p>'; }
else {
  list.sort(function(a,b){ return a.date<b.date?1:-1; });
  var rows='';
  list.forEach(function(r){
    rows+='<tr><td><a href="'+r.date+'.html">'+r.date+'</a></td>'
      +'<td class="'+(r.pnlPct>=0?'pos':'neg')+'">'+fmtPctOnly(r.pnlPct)+'</td>'
      +'<td>'+fmtUsd(r.totalValue)+'</td></tr>';
  });
  el.innerHTML='<table><thead><tr><th>Date</th><th>EOD P/L %</th><th>Account value</th></tr></thead><tbody>'+rows+'</tbody></table>';
}
</script>
</body>
